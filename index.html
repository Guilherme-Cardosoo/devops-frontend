<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Produtos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerenciamento de Produtos</h1>

        <form id="produto-form">
            <input
                type="text"
                id="nome"
                placeholder="Nome do produto"
                required
            >
            <input
                type="number"
                id="preco"
                placeholder="Preço"
                step="0.01"
                required
            >
            <input
                type="text"
                id="categoria"
                placeholder="Categoria"
                required
            >
            <button type="submit">
                Cadastrar
            </button>
        </form>

        <hr>

        <h2>Produtos cadastrados</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Categoria</th>
                    <th>Preço</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista-produtos">
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>

</body>
</html>
